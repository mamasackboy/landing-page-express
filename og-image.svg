<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="630" fill="#f7f4f0"/>

  <!-- Subtle warm accent bar at top -->
  <rect y="0" width="1200" height="6" fill="#a0522d"/>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="rgba(46,37,32,0.1)" stroke-width="1.5"/>

  <!-- Eyebrow -->
  <g transform="translate(80, 110)">
    <circle cx="0" cy="0" r="4" fill="#a0522d"/>
    <text x="14" y="5" fill="#a0522d" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2">LIVE IN 24 HOURS</text>
  </g>

  <!-- Headline -->
  <text x="80" y="220" fill="#1c1612" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" letter-spacing="-2">A real landing page,</text>
  <text x="80" y="305" fill="#a0522d" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" font-weight="400" letter-spacing="-2">built and live today.</text>

  <!-- Subhead -->
  <text x="80" y="370" fill="#76685c" font-family="system-ui, -apple-system, sans-serif" font-size="21" font-weight="400">No discovery calls. No three-week timeline. $99 flat, source code yours.</text>

  <!-- CTA button -->
  <g transform="translate(80, 420)">
    <rect width="260" height="68" rx="10" fill="#a0522d"/>
    <text x="130" y="43" fill="#f7f4f0" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" text-anchor="middle">Pay $99  →</text>
  </g>

  <!-- Delivery note -->
  <g transform="translate(370, 420)">
    <circle cx="12" cy="34" r="4" fill="#2e8b57"/>
    <text x="24" y="30" fill="#1c1612" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="600">4–6 hours typical</text>
    <text x="24" y="52" fill="#76685c" font-family="system-ui, -apple-system, sans-serif" font-size="14">Refundable. Repo handed over.</text>
  </g>

  <!-- Bottom brand -->
  <text x="80" y="560" fill="#9a8e83" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="1">LANDING PAGE EXPRESS</text>

  <!-- Corner accents -->
  <g stroke="#a0522d" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M1060 100 L1094 100 L1094 134"/>
    <path d="M1094 510 L1094 544 L1060 544"/>
  </g>
</svg>
